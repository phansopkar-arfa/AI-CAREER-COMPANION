<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo Page - Student Career Companion</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #00c6ff 100%);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 8px 22px #2a52982e;
      user-select: none;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px #00c6ffa8;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #c0e7ff;
    }
    .btn-primary {
      padding: 14px 44px;
      border-radius: 32px;
      background: white;
      color: #2a5298;
      font-weight: 800;
      font-size: 1.25rem;
      box-shadow: 0 12px 38px #00c6ff88;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
      user-select: none;
    }
    .btn-primary:hover {
      background: #2a5298;
      color: white;
      box-shadow: 0 20px 48px #00c6ffaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Demo Feature Page</h1>
    <p>This is a placeholder page to test login access and logout functionality.</p>
    <button class="btn-primary" onclick="window.location.href='{% url 'logout' %}'">Logout</button>
  </div>
</body>
</html>
