<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Set New Password | Career Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f5f7ff', 100: '#ebf0ff', 200: '#d6e0ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .input-focus:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-200/30 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-200/30 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-[440px] relative z-10 space-y-8">
        <div class="flex flex-col items-center text-center space-y-4">
            <div class="w-16 h-16 bg-emerald-500 rounded-3xl flex items-center justify-center text-white text-3xl shadow-xl shadow-emerald-500/20 font-outfit">
                🔑
            </div>
            <div>
                <h1 class="text-3xl font-black text-slate-900 font-outfit tracking-tight">Access Control</h1>
                <p class="text-slate-500 text-sm mt-2 font-medium">Verify your identity and set a new password</p>
            </div>
        </div>

        <div class="glass bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50">
            <form method="POST" action="{% url 'password_reset_confirm' %}" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="user_id" value="{{ target_user_id }}">
                
                {% if messages %}
                <div class="space-y-2">
                    {% for message in messages %}
                        <div class="bg-rose-50 border border-rose-100 text-rose-600 px-4 py-3 rounded-2xl text-[10px] font-black uppercase">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
                {% endif %}

                <div class="space-y-2">
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">New Secret Key</label>
                    <input type="password" name="password1" required
                           class="w-full bg-slate-50 border border-slate-100 px-6 py-4 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" 
                           placeholder="••••••••">
                </div>

                <div class="space-y-2">
                    <label class="block text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Confirm Secret</label>
                    <input type="password" name="password2" required
                           class="w-full bg-slate-50 border border-slate-100 px-6 py-4 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" 
                           placeholder="••••••••">
                </div>

                <button type="submit" 
                        class="w-full bg-brand-600 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-brand-500/20 hover:bg-brand-700 transition-all active:scale-[0.98]">
                    Update Credentials
                </button>
            </form>

            <div class="mt-8 text-center border-t border-slate-50 pt-6">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] leading-relaxed">Ensure your new password uses a mix of symbols, numbers and characters.</p>
            </div>
        </div>
    </div>
</body>
</html>
