<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Account | Career Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f7ff',
                            100: '#ebf0ff',
                            200: '#d6e0ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .input-focus:focus { border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        .edu-radio:checked + label { border-color: #6366f1; background-color: #f5f7ff; color: #4f46e5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 sm:p-8 relative">
    
    <!-- Abstract Background -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-200/30 rounded-full blur-[120px]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-200/30 rounded-full blur-[120px]"></div>

    <div class="w-full max-w-[500px] relative z-10 space-y-8 animate-in fade-in duration-700">
        <!-- Header -->
        <div class="flex flex-col items-center text-center space-y-4">
            <div class="w-14 h-14 bg-brand-600 rounded-3xl flex items-center justify-center text-white text-2xl shadow-xl shadow-brand-500/20 font-outfit">
                🎓
            </div>
            <div>
                <h1 class="text-3xl font-black text-slate-900 font-outfit tracking-tighter uppercase">Create Account</h1>
                <p class="text-slate-500 text-sm mt-1 font-medium italic">Begin your professional growth journey</p>
            </div>
        </div>

        <!-- Card -->
        <div class="glass bg-white p-8 sm:p-10 rounded-[2.5rem] shadow-2xl shadow-slate-200/50">
            <form method="POST" action="{% url 'register' %}" class="space-y-6">
                {% csrf_token %}
                
                {% if form.non_field_errors %}
                    <div class="bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-2xl text-[10px] font-black uppercase">
                        {{ form.non_field_errors }}
                    </div>
                {% endif %}

                <!-- Section: Core Data -->
                <div class="space-y-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-1 h-3 bg-brand-600 rounded-full"></div>
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Personal Facts</h3>
                    </div>
                    
                    <div class="space-y-4">
                        <!-- Full Name -->
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Full Name</label>
                            <input type="text" name="name" required class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" placeholder="Jane Doe">
                        </div>

                        <!-- Registration & Branch -->
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Reg No</label>
                                <input type="text" name="registration" class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" placeholder="2024-XXX">
                            </div>
                            <div class="space-y-1.5">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Branch</label>
                                <input type="text" name="branch" class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" placeholder="CS/IT">
                            </div>
                        </div>

                        <!-- Contact & Email -->
                        <div class="grid grid-cols-1 gap-4">
                             <div class="space-y-1.5">
                                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">College Email</label>
                                <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" placeholder="name@college.edu">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section: Education History -->
                <div class="space-y-4 pt-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-1 h-3 bg-indigo-500 rounded-full"></div>
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Academic History (10th)</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Year</label>
                            <input type="text" name="passing_year_10" placeholder="YYYY" class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Grade %</label>
                            <input type="text" name="percentage_10" placeholder="85%" class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus">
                        </div>
                    </div>
                </div>

                <!-- Higher Secondary Toggle -->
                <div class="space-y-3 pt-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Stream Track</label>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <input type="radio" name="education" id="edu_12" value="12" class="hidden edu-radio" onclick="toggleEducationFields()">
                            <label for="edu_12" class="block w-full text-center py-3 border border-slate-100 rounded-2xl text-xs font-black uppercase tracking-widest text-slate-500 cursor-pointer transition-all hover:bg-slate-50">12th Standard</label>
                        </div>
                        <div class="flex-1">
                            <input type="radio" name="education" id="edu_diploma" value="diploma" class="hidden edu-radio" onclick="toggleEducationFields()">
                            <label for="edu_diploma" class="block w-full text-center py-3 border border-slate-100 rounded-2xl text-xs font-black uppercase tracking-widest text-slate-500 cursor-pointer transition-all hover:bg-slate-50">Diploma</label>
                        </div>
                    </div>
                </div>

                <div id="educationFields" class="animate-in fade-in slide-in-from-top-2 duration-300"></div>

                <!-- Password Block -->
                <div class="space-y-4 pt-4">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-1 h-3 bg-amber-500 rounded-full"></div>
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Credentials Control</h3>
                    </div>
                    <div class="space-y-4">
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Security Key</label>
                            <input type="password" name="password1" required class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" placeholder="••••••••">
                            <p class="text-[9px] text-slate-400 italic ml-1 font-medium leading-tight">Must contain uppercase, number, & symbol (min 8 chars)</p>
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Confirm Secret</label>
                            <input type="password" name="password2" required class="w-full bg-slate-50 border border-slate-100 px-5 py-3.5 rounded-2xl text-sm font-medium text-slate-900 outline-none transition-all input-focus" placeholder="••••••••">
                        </div>
                    </div>
                </div>

                <button type="submit" 
                        class="w-full bg-brand-600 text-white py-4 mt-6 rounded-[1.25rem] font-black text-sm uppercase tracking-[0.2em] shadow-xl shadow-brand-500/20 hover:bg-brand-700 transition-all hover:-translate-y-0.5 active:scale-[0.98]">
                    Register Account
                </button>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-50 text-center">
                <p class="text-sm text-slate-500 font-medium">
                    Already registered? 
                    <a href="{% url 'login' %}" class="text-brand-600 font-bold ml-1 hover:underline decoration-2 underline-offset-4">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function toggleEducationFields() {
            const edu12 = document.getElementById("edu_12").checked;
            const fieldsDiv = document.getElementById("educationFields");
            fieldsDiv.innerHTML = "";
            
            const fieldHTML = (label1, name1, label2, name2) => `
                <div class="bg-brand-50/50 border border-brand-100/50 p-6 rounded-3xl grid grid-cols-2 gap-4 mt-4 animate-in fade-in duration-500">
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-black text-brand-600 uppercase tracking-widest">${label1}</label>
                        <input type="number" name="${name1}" required class="w-full bg-white border border-brand-100 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-900 outline-none input-focus">
                    </div>
                    <div class="space-y-1.5">
                        <label class="block text-[10px] font-black text-brand-600 uppercase tracking-widest">${label2}</label>
                        <input type="text" name="${name2}" required placeholder="85%" class="w-full bg-white border border-brand-100 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-900 outline-none input-focus">
                    </div>
                </div>
            `;

            if (edu12) {
                fieldsDiv.innerHTML = fieldHTML("12th Year", "passing_year_12", "12th Result %", "percentage_12");
            } else {
                fieldsDiv.innerHTML = fieldHTML("Diploma Year", "passing_year_diploma", "Diploma Result %", "percentage_diploma");
            }
        }
    </script>
</body>
</html>
